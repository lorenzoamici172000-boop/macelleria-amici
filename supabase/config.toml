[project]
id = "macelleria-amici"
name = "Macelleria Amici"

[db]
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./supabase/seed"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://macelleria-amici.netlify.app"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = false

[storage]
enabled = true
file_size_limit = "10MB"

[edge_runtime]
policy = "per_worker"

[functions.sync-reviews]
verify_jwt = false

[functions.aggregate-stats]
verify_jwt = false

[functions.release-stock]
verify_jwt = false
